services:
  carperntry-shop:
      container_name: carperntry-shop
      image: ghcr.io/simanga-dev/carperntry-shop:latest
      restart: always
      ports:
        - "8080:8080"
      environment:
        - DB_CONNECTION=Host=postgres-db;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};Database=${POSTGRES_DB}
      depends_on:
        - postgres-db
