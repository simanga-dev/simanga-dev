  #       - MEILI_NO_ANALYTICS=true
  #     volumes:
  #       - ./meili_data_v1.7:/meili_data
  #
  postgres-db:
    image: postgres
    # ports:
    #   # - "5432:5432"
    environment:
      - "POSTGRES_USER=${POSTGRES_USER}"
      - "POSTGRES_PASSWORD=${POSTGRES_PASSWORD}"
      - "POSTGRES_DB=${POSTGRES_DB}"
    volumes:
      - postgres-data:/var/lib/postgresql/data
volumes:
  postgres-data:
